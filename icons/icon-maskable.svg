<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Maskable variant: content scaled to 80% safe zone, full-bleed background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (no rounded corners - OS applies its own mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content scaled to 80% and centered -->
  <g transform="translate(256,256) scale(0.72) translate(-256,-256)">
    <g transform="translate(256, 220) rotate(-6)">
      <rect x="-130" y="-110" width="260" height="210" rx="50" fill="#e94560"/>
      <polygon points="-80,90 -40,90 -100,170" fill="#e94560"/>
    </g>
    <g stroke="#e94560" stroke-linecap="round" opacity="0.9">
      <line x1="390" y1="90" x2="445" y2="55" stroke-width="28"/>
      <line x1="410" y1="150" x2="470" y2="135" stroke-width="30"/>
      <line x1="405" y1="215" x2="462" y2="225" stroke-width="28"/>
      <line x1="115" y1="95" x2="58" y2="62" stroke-width="28"/>
      <line x1="95" y1="160" x2="38" y2="145" stroke-width="30"/>
    </g>
    <g transform="translate(256, 210) rotate(-6)">
      <rect x="-18" y="-80" width="36" height="100" rx="10" fill="#ffffff"/>
      <circle cx="0" cy="48" r="20" fill="#ffffff"/>
    </g>
  </g>
</svg>
