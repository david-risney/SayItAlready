<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- OG/Social sharing image: 1200x630, icon left + title right -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Icon on the left, scaled and centered vertically -->
  <g transform="translate(280, 300) scale(0.85)">
    <g transform="rotate(-6)">
      <rect x="-130" y="-110" width="260" height="210" rx="50" fill="#e94560"/>
      <polygon points="-80,90 -40,90 -100,170" fill="#e94560"/>
    </g>
    <g stroke="#e94560" stroke-linecap="round" opacity="0.9">
      <line x1="134" y1="-130" x2="189" y2="-165" stroke-width="28"/>
      <line x1="154" y1="-70" x2="214" y2="-85" stroke-width="30"/>
      <line x1="149" y1="-5" x2="206" y2="5" stroke-width="28"/>
      <line x1="-141" y1="-125" x2="-198" y2="-158" stroke-width="28"/>
      <line x1="-161" y1="-60" x2="-218" y2="-75" stroke-width="30"/>
    </g>
    <g transform="rotate(-6)">
      <rect x="-18" y="-90" width="36" height="100" rx="10" fill="#ffffff"/>
      <circle cx="0" cy="38" r="20" fill="#ffffff"/>
    </g>
  </g>
  <!-- Title text on the right -->
  <text x="560" y="270" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="88" fill="#e94560">Say It</text>
  <text x="560" y="380" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="88" fill="#ffffff">Already!</text>
  <text x="560" y="440" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="#ffffff" opacity="0.6">A party word guessing game</text>
</svg>
